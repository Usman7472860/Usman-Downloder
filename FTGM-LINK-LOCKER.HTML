<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
<script>
        // DOM Elements
        const urlInput = document.getElementById("url");
        const urlKeyInput = document.getElementById("url_key");
        const lockedUrlTextarea = document.getElementById("locked_url");
        const copyMessage = document.getElementById("copyMessage");
        const lockDiv = document.getElementById("lock_div_id");
        const urlDisplayDiv = document.getElementById("url_display_id");

        // Event Listeners
        document.getElementById("lock_btn").addEventListener("click", encrypt, false);
        document.getElementById("copy_btn").addEventListener("click", copy, false);

        function encrypt() {
            if (urlInput.value === '' || urlKeyInput.value === '') {
                // Use a simple alert for input validation
                alert('URL or Secret Key cannot be empty!');
                return;
            }
            
            // Core Encryption Logic
            const EncryptED = CryptoJS.AES.encrypt(urlInput.value, urlKeyInput.value);
            const url_hash = EncryptED.toString()
                                    .replace(/\+/g, 'p1L2u3S')
                                    .replace(/\//g, 's1L2a3S4h')
                                    .replace(/=/g, 'e1Q2u3A4l');
            
            // NOTE: Replace with your actual hosted URL if different
            const locked_url = "https://url-locker.vercel.app/?hash=" + url_hash;
            
            lockDiv.style.display = "none";
            urlDisplayDiv.style.display = "block";
            lockedUrlTextarea.value = locked_url;
            
            // QR Code Generation
            document.getElementById("lurl_qr").src = "https://api.qrserver.com/v1/create-qr-code/?data=" + encodeURIComponent(locked_url) + "&size=120x120&color=212529";
        }

        // --- Clipboard Copy Function (Fix) ---
        async function copy() {
            const textToCopy = lockedUrlTextarea.value;
            
            try {
                // 1. Try modern Clipboard API (requires secure context - HTTPS)
                await navigator.clipboard.writeText(textToCopy);
                showToast("URL Copied! ✅");
            } catch (err) {
                // 2. Fallback to older document.execCommand('copy')
                try {
                    lockedUrlTextarea.select();
                    lockedUrlTextarea.setSelectionRange(0, 99999);
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showToast("URL Copied! ✅ (Fallback)");
                    } else {
                        throw new Error("Copy command failed.");
                    }
                } catch (err) {
                    // 3. Last resort notification
                    console.error('Failed to copy text: ', err);
                    alert("Failed to automatically copy URL. Please copy it manually.");
                }
            } finally {
                // Clear selection after copying for a cleaner look
                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }
            }
        }
        
        // --- Modern Toast Popup Function ---
        function showToast(message) {
            copyMessage.textContent = message;
            copyMessage.classList.add('show');
            
            // Hide the toast after 3 seconds
            setTimeout(function() {
                copyMessage.classList.remove('show');
            }, 3000);
        }
    </script>
