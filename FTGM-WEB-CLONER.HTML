<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM Simple Web Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* --- CORE THEME VARIABLES (Simple Blue) --- */
        :root {
            --primary-color: #007bff; /* Blue */
            --success-color: #28a745; /* Green */
            --warning-color: #ffc107; /* Yellow */
            --info-color: #17a2b8; /* Cyan */
            --secondary-color: #6c757d; /* Gray */
            
            --background-light: #f4f6f9;
            --card-background: #ffffff; 
            --text-dark: #212529; 
            --border-light: #e9ecef; 
        }

        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            color: var(--text-dark);
        }
        
        body {
            background-color: var(--background-light); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        /* --- Main Card/Container --- */
        .card-theme {
            background-color: var(--card-background);
            border-radius: 20px; 
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08); 
            border: 1px solid var(--border-light);
            width: 100%;
            max-width: 800px; 
        }

        /* --- Input/Select --- */
        .input-theme {
            border: 1px solid var(--border-light) !important;
            border-radius: 12px !important; 
            background-color: var(--background-light) !important;
            height: 50px;
            transition: all 0.3s ease;
            width: 100%;
            padding: 10px 15px;
            font-size: 1rem;
        }
        .input-theme:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.25) !important; 
            background-color: #fff !important;
        }

        /* --- Buttons (Fixed Color Issues) --- */
        .btn-theme {
            border-radius: 12px !important; 
            font-weight: 600 !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1) !important;
            transition: all 0.3s ease;
            font-size: 1rem !important;
            height: 50px; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            width: 100%;
            color: white !important; 
        }
        .btn-primary { background-color: var(--primary-color) !important; }
        .btn-secondary { background-color: var(--secondary-color) !important; color: white !important;}
        .btn-success { background-color: var(--success-color) !important; }
        .btn-warning { background-color: var(--warning-color) !important; color: var(--text-dark) !important; } 
        .btn-info { background-color: var(--info-color) !important; }
        
        /* --- TITLE STYLES --- */
        .bungee-title {
            font-family: 'Bungee', cursive;
            color: var(--primary-color); 
            letter-spacing: 2px;
        }
        
        /* --- TOAST NOTIFICATION --- */
        #centralToast {
            position: fixed;
            bottom: 20px; 
            left: 50%;
            transform: translate(-50%, 100%) scale(0.8); 
            width: 350px;
            background-color: var(--card-background);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubi-bezier(0.68, -0.55, 0.27, 1.55);
            text-align: center;
        }
        #centralToast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, 0) scale(1);
        }
        
        /* --- Modal Styles --- */
        #previewModal {
            display: none; 
            position: fixed;
            inset: 0;
            background-color: rgba(33, 37, 41, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
        }
        #previewModal.flex {
            display: flex; 
        }
        
        #previewModal .modal-content {
            background-color: white;
            padding: 20px; 
            border-radius: 20px;
            width: 100%;
            max-width: 90vw; 
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* --- Iframe Area --- */
        #previewIframe {
            height: 400px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            background-color: white; 
            display: block; 
        }
        
    </style>
</head>
<body class="min-h-screen">

    <div id="centralToast">
        <i id="toastIcon" class="toast-icon"></i>
        <p id="toastTitle" class="font-bold text-xl mb-1"></p>
        <p id="toastMessage" class="text-md text-secondary-color"></p>
    </div>

    <div class="max-w-4xl mx-auto w-full p-4 md:p-0">
        <header class="text-center mb-8 mt-6">
            <h1 class="text-4xl md:text-6xl bungee-title mb-2 tracking-tight">FTGM Web Code Fetcher</h1>
            <p class="text-secondary-color text-lg max-w-2xl mx-auto">Get the full HTML source code and preview it instantly.</p>
        </header>

        <section class="p-8 card-theme">
            <h2 class="text-xl font-bold text-text-dark mb-4">
                1. Enter Target URL
            </h2>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://harlequin-nedda-91.tiiny.site)"
                    class="input-theme flex-grow">
            </div>
            
            <div class="mt-6">
                <button onclick="fetchSourceCode()" id="scrapeBtn"
                    class="btn-theme btn-primary">
                    <i class="fas fa-search mr-2"></i> Get Source & Preview
                </button>
            </div>
        </section>
        
        <div class="flex justify-center flex-wrap gap-4 mt-8">
            <a href="https://whatsapp.com/channel/0029VbAzazM2kNFp4p1qIZ2P" target="_blank" class="social-button text-white bg-green-500 hover:bg-green-600 transition p-2 px-4 rounded-full flex items-center shadow-lg">
                <i class="fab fa-whatsapp mr-2"></i> More Tools (Channel)
            </a>
            <a href="https://wa.me/+923104882921?text=Hi+FTGM" target="_blank" class="social-button text-white bg-blue-500 hover:bg-blue-600 transition p-2 px-4 rounded-full flex items-center shadow-lg">
                <i class="fas fa-comment-dots mr-2"></i> Contact FTGM
            </a>
        </div>
    </div>
    
    <div id="previewModal">
        <div class="modal-content">
            <h3 class="text-2xl font-bold mb-4 text-primary-color">Live Preview & Code Viewer</h3>
            
            <div class="mb-6 relative">
                <iframe id="previewIframe" title="Scraped Code Live View" class="w-full"></iframe>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                
                <button id="toggleViewBtn" onclick="toggleCodeView()" 
                    class="btn-theme btn-info">
                    <i class="fas fa-code mr-2"></i> See Code
                </button>
                
                <button onclick="copyOutput()" 
                    class="btn-theme btn-success">
                    <i class="fas fa-copy mr-2"></i> Copy Code
                </button>
                
                <button onclick="downloadCode()" 
                    class="btn-theme btn-warning">
                    <i class="fas fa-download mr-2"></i> Download
                </button>
                
                <button onclick="hideModal()" class="btn-theme btn-secondary">
                    <i class="fas fa-arrow-left mr-2"></i> Back
                </button>
            </div>
            
            <input type="text" id="downloadFileName" placeholder="Custom file name (Default: Scraped_By_FTGM.html)" 
                class="w-full mt-4 input-theme h-auto p-2 text-sm">

        </div>
    </div>
    
    <div class="footer-content text-center mt-8 max-w-4xl mx-auto text-secondary-color">
        <p>Developed with Mind by <a href="https://whatsapp.com/channel/0029VbAzazM2kNFp4p1qIZ2P" target="_blank" class="text-primary-color font-bold">FTGM HACKS</a></p>
    </div>

    <script>
        // Global variable to store the fetched code and the current view state
        let scrapedHTMLContent = '';
        let isCodeViewActive = false; // Tracks if the iframe is showing raw code (true) or live preview (false)

        const urlInput = document.getElementById('urlInput');
        const previewIframe = document.getElementById('previewIframe');
        const toggleViewBtn = document.getElementById('toggleViewBtn');

        // --- Core Toast Notification (Refined) ---
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('centralToast');
            const icon = document.getElementById('toastIcon');
            const titleEl = document.getElementById('toastTitle');
            const messageEl = document.getElementById('toastMessage');
            
            toast.className = '';
            
            let iconClass;
            
            if (type === 'success') {
                iconClass = 'fas fa-check-circle text-green-600';
            } else if (type === 'warning') {
                iconClass = 'fas fa-exclamation-triangle text-yellow-600';
            } else if (type === 'error') {
                iconClass = 'fas fa-times-circle text-red-600';
            }
            
            icon.className = iconClass;
            titleEl.textContent = title;
            messageEl.textContent = message;

            void toast.offsetWidth; 
            setTimeout(() => {
                toast.classList.add('show');
            }, 50);

            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // --- Modal/UI Functions ---

        // Professional Scrapping Animation HTML
        const loadingAnimationHTML = (url) => `
            <html>
                <head>
                    <style>
                        body {
                            background-color: #2c3e50; 
                            color: #ecf0f1; 
                            font-family: 'Poppins', sans-serif;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            height: 100vh;
                            margin: 0;
                            padding: 20px;
                            text-align: center;
                        }
                        .container {
                            width: 80%;
                            max-width: 400px;
                        }
                        .header {
                            font-size: 1.5rem;
                            font-weight: 700;
                            margin-bottom: 20px;
                            color: #3498db; 
                        }
                        .progress-bar {
                            background-color: #34495e; 
                            border-radius: 50px;
                            height: 15px;
                            width: 100%;
                            overflow: hidden;
                            margin-bottom: 10px;
                        }
                        .progress-bar-fill {
                            height: 100%;
                            background-color: #2ecc71; 
                            width: 0;
                            border-radius: 50px;
                            animation: progress-load 3s ease-in-out infinite;
                        }
                        @keyframes progress-load {
                            0% { width: 0%; }
                            50% { width: 80%; }
                            100% { width: 95%; }
                        }
                        .status-text {
                            font-size: 0.9rem;
                            color: #95a5a6; 
                        }
                        .status-text:before {
                            content: "🌐 ";
                        }
                        .url-text {
                            font-size: 0.8rem;
                            color: #bdc3c7;
                            word-break: break-all;
                            margin-top: 5px;
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div class="header">Fetching Source Code...</div>
                        <div class="progress-bar">
                            <div class="progress-bar-fill"></div>
                        </div>
                        <div class="status-text">Establishing secure connection and parsing HTML...</div>
                        <div class="url-text">${url}</div>
                    </div>
                </body>
            </html>
        `;
        
        // Helper function to format raw code for display inside the iframe
        function getCodeViewHTML(code) {
            const escapedCode = code.replace(/&/g, '&amp;')
                                   .replace(/</g, '&lt;')
                                   .replace(/>/g, '&gt;')
                                   .replace(/"/g, '&quot;')
                                   .replace(/'/g, '&#039;');
            
            return `
                <html>
                <body style="background-color: #2c2c2c; color: #00ff00; font-family: monospace; padding: 15px; margin: 0; overflow-y: scroll; white-space: pre-wrap;">
                    <pre style="margin:0; padding:0;">${escapedCode}</pre>
                </body>
                </html>
            `;
        }

        // Core function to inject content into the iframe
        function runCodeInIframe(code, isError = false) {
            let iframeDoc = previewIframe.contentDocument || (previewIframe.contentWindow ? previewIframe.contentWindow.document : null);

            if (!iframeDoc) {
                console.error("Iframe document not accessible.");
                return;
            }
            
            // FIX: Explicitly open/close to clear the previous document object model (DOM) 
            // and force a fresh render for execution.
            iframeDoc.open();
            iframeDoc.close(); // Clearing step

            iframeDoc.open();
            if (code) {
                if (isError) {
                     iframeDoc.write(`
                        <html>
                        <body style="font-family: Poppins; text-align: center; padding: 50px; color: #dc3545; font-weight: 600;">
                            <h3>Error Fetching Source Code</h3>
                            <p>${code}</p>
                            <p>Check the URL or try manually copying the HTML if proxies are blocked.</p>
                        </body>
                        </html>
                    `);
                } else {
                    // This path is for the executable HTML (Live Preview or Animation)
                    iframeDoc.write(code);
                }
            } else {
                // Default placeholder
                iframeDoc.write('<html><body style="font-family: Poppins; text-align: center; padding: 50px; color: var(--secondary-color);"><h1>Live Preview Area</h1><p>Enter a URL and click **Get Source & Preview**.</p></body></html>');
            }
            iframeDoc.close();
            // If we wrote executable HTML, we are in Live Preview state
            isCodeViewActive = false; 
        }

        function showModal() {
            document.getElementById('previewModal').classList.add('flex');
        }

        function hideModal() {
            document.getElementById('previewModal').classList.remove('flex');
            // Reset view to Live Preview state
            toggleViewBtn.innerHTML = '<i class="fas fa-code mr-2"></i> See Code';
            toggleViewBtn.classList.remove('btn-primary');
            toggleViewBtn.classList.add('btn-info');
            isCodeViewActive = false;
        }
        
        // This function now toggles the content *inside* the iframe
        function toggleCodeView() {
            if (!scrapedHTMLContent) {
                showToast("No Code Fetched", "Please scrape a URL first.", "warning");
                return;
            }

            if (!isCodeViewActive) {
                // Current state is Live Preview (false) -> Switch to Code View (true)
                
                // We don't use the regular runCodeInIframe here, because the raw code is NOT executable HTML
                let iframeDoc = previewIframe.contentDocument || (previewIframe.contentWindow ? previewIframe.contentWindow.document : null);
                if (!iframeDoc) return;
                
                // 1. Clear and Write Raw Code
                iframeDoc.open();
                iframeDoc.close(); // Clear
                iframeDoc.open();
                iframeDoc.write(getCodeViewHTML(scrapedHTMLContent));
                iframeDoc.close();

                // 2. Update Button State
                toggleViewBtn.innerHTML = '<i class="fas fa-play mr-2"></i> Run Code';
                toggleViewBtn.classList.remove('btn-info');
                toggleViewBtn.classList.add('btn-primary');
                isCodeViewActive = true; 

            } else {
                // Current state is Code View (true) -> Switch back to Run View (Live Preview) (false)
                
                // FIX: Use the original runCodeInIframe function, which correctly forces the re-execution
                runCodeInIframe(scrapedHTMLContent); 
                
                // Update Button State
                toggleViewBtn.innerHTML = '<i class="fas fa-code mr-2"></i> See Code';
                toggleViewBtn.classList.remove('btn-primary');
                toggleViewBtn.classList.add('btn-info');
                // isCodeViewActive is set to false by runCodeInIframe
            }
        }

        // --- Fetch/Scrape Logic ---

        function isValidURL(url) {
            try {
                new URL(url);
                return true;
            } catch {
                return false;
            }
        }

        async function fetchWithProxy(url) {
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                url
            ];

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl, { mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return await response.text();
                } catch (error) {
                    if (proxyUrl === url) {
                        throw new Error(`All attempts failed: ${error.message}`);
                    }
                }
            }
        }

        async function fetchSourceCode() {
            const url = urlInput.value.trim();

            if (!isValidURL(url)) {
                showToast('Action Required', 'Enter a valid URL to start viewing!', 'warning');
                return;
            }
            
            // 1. Show modal and the loading animation
            showModal();
            scrapedHTMLContent = ''; // Clear previous content
            
            // Inject the professional loading animation into the iframe
            runCodeInIframe(loadingAnimationHTML(url));
            
            // Reset button state
            toggleViewBtn.innerHTML = '<i class="fas fa-code mr-2"></i> See Code';
            toggleViewBtn.classList.remove('btn-primary');
            toggleViewBtn.classList.add('btn-info');

            try {
                // 2. Fetch the HTML
                const htmlText = await fetchWithProxy(url);
                
                if (!htmlText) {
                    throw new Error('Retrieved empty content.');
                }
                
                scrapedHTMLContent = htmlText;

                // 3. Update the modal with the live code
                runCodeInIframe(scrapedHTMLContent);
                showToast('View Complete', `Successfully fetched live code.`, 'success');

            } catch (error) {
                // 4. Handle errors by showing them in the Iframe
                runCodeInIframe(error.message, true); // Pass error message and flag
                showToast('Fetch Failed', `Error fetching URL.`, 'error');
            }
        }

        // --- Copy & Download Functions (Standardized) ---

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0"; 

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                return successful;
            } catch (err) {
                document.body.removeChild(textArea);
                return false;
            }
        }

        function copyOutput() {
            const textToCopy = scrapedHTMLContent.trim();
            
            if (!textToCopy) {
                showToast("Nothing to Copy", "Fetch a URL first!", "warning");
                return;
            }
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy)
                    .then(() => {
                        showToast("Code Copied!", "The full HTML source is in your clipboard.", "success");
                    })
                    .catch(() => {
                        if (!fallbackCopyTextToClipboard(textToCopy)) {
                            showToast("Copy Failed", "Please copy the text manually.", "error");
                        } else {
                            showToast("Code Copied!", "The full HTML source is in your clipboard.", "success");
                        }
                    });
            } else {
                if (!fallbackCopyTextToClipboard(textToCopy)) {
                    showToast("Copy Failed", "Please copy the text manually.", "error");
                } else {
                    showToast("Code Copied!", "The full HTML source is in your clipboard.", "success");
                }
            }
        }

        function downloadCode() {
            const text = scrapedHTMLContent.trim();
            if (!text) {
                showToast("No Data to Download", "Fetch a URL first!", "warning");
                return;
            }
            
            const customName = document.getElementById('downloadFileName').value.trim();
            const fileName = customName || 'Scraped_By_FTGM.html';

            try {
                const blob = new Blob([text], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName.endsWith('.html') ? fileName : `${fileName}.html`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                
                showToast("Download Complete", `${a.download} is now in your downloads.`, "success");
            } catch (error) {
                showToast("Download Error", "Could not complete the file download.", "error");
            }
        }
        
        // Initialize the iframe content on load
        document.addEventListener('DOMContentLoaded', () => {
            runCodeInIframe(null); 
        });

    </script>
</body>
</html>
