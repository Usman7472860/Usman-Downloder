<!DOCTYPE html><html lang="en"><head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM Post Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b4332; /* Deep Green */
            --secondary: #2d6a4f; /* Dark Green */
            --accent: #52b788; /* Forest Green */
            --light-green: #d8f3dc;
            --bg-body: #f0fdf4;
            --surface: #ffffff;
            --text-main: #081c15;
            --text-muted: #40916c;
            --border: #d8f3dc;
            --shadow: 0 10px 30px -5px rgba(45, 106, 79, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .main-card {
            background: var(--surface);
            width: 100%;
            max-width: 700px;
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        /* Shimmer Title Animation */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin: 0 0 30px 0;
            background: linear-gradient(90deg, #1b4332, #52b788, #1b4332);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .picker-label {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 20px 0 10px 5px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .item-tile {
            flex: 0 0 auto;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid var(--border);
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        .item-tile:nth-child(odd) { border-radius: 18px 6px 18px 6px; }
        .item-tile:nth-child(even) { border-radius: 6px 18px 6px 18px; }

        .item-tile:hover {
            transform: translateY(-5px);
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 15px rgba(45, 106, 79, 0.25);
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            font-family: inherit;
            font-size: 1.1rem;
            background: #ffffff;
            box-sizing: border-box;
            outline: none;
            min-height: 140px;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            margin: 25px 0;
        }

        select {
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid var(--border);
            font-weight: 600;
            font-family: inherit;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .btn-generate {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #52b788 100%);
            background-size: 200% auto;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0 40px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(27, 67, 50, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 55px;
            animation: buttonPulse 3s infinite;
        }

        .btn-generate:hover {
            background-position: right center;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(45, 106, 79, 0.4);
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(82, 183, 136, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(82, 183, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(82, 183, 136, 0); }
        }

        .output-container {
            background: #f8fafc;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            border: 2px solid var(--border);
            position: relative;
        }

        #output {
            font-size: 1.3rem;
            min-height: 50px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-main);
            line-height: 1.6;
        }

        .btn-copy {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-copy:hover { background: #000; transform: translateY(-2px); }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }

        .whatsapp-btn, .more-tools-btn {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 700;
            text-align: center;
            transition: 0.3s;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .more-tools-btn {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(27, 67, 50, 0.2);
        }

        .whatsapp-btn:hover, .more-tools-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            background: #081c15;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .controls-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .main-card { padding: 25px; }
        }
    </style>
</head>

            chars.forEach(c => createTile(c, charContainer));
            emojis.forEach(e => createTile(e, emojiContainer));
        }

        function createTile(val, container) {
            const div = document.createElement('div');
            div.className = 'item-tile';
            div.textContent = val;
            div.onclick = () => {
                const area = document.getElementById('inputText');
                const start = area.selectionStart;
                area.value = area.value.substring(0, start) + val + area.value.substring(area.selectionEnd);
                area.focus();
                area.selectionStart = area.selectionEnd = start + val.length;
                generateStylishFont();
            };
            container.appendChild(div);
        }

        function generateStylishFont() {
            const text = document.getElementById('inputText').value;
            const style = document.getElementById('fontStyleSelector').value;
            const map = fontMaps[style];
            let result = "";

            for (let char of text) {
                if (char === '\n' || char === ' ') {
                    result += char;
                } else if (map[char]) {
                    result += map[char];
                } else {
                    result += char;
                }
            }
            document.getElementById('output').innerText = result || "Output will appear here...";
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            if (!text || text === "Output will appear here...") return;

            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied Successfully! ✅");
            }).catch(() => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("Copied Successfully! ✅");
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        document.getElementById('inputText').addEventListener('input', generateStylishFont);
        window.onload = initPickers;
    </script>
</body></html>
