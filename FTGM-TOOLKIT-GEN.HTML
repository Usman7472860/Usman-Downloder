<!DOCTYPE html><html lang="en"><head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>FTGM Toolkit Gen - Pro Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&amp;family=Anta&amp;family=Russo+One&amp;family=Nova+Square&amp;family=Keania+One&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050510; --card: #101025; --success: #39ff14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Anta', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        
        h1 { font-family: 'Audiowide'; font-size: 1.5rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); text-align: center; margin: 10px 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); border: 1px solid #1e1e3f; border-radius: 15px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .section-title { font-size: 0.9rem; color: var(--accent); text-align: left; margin: 18px 0 8px 5px; text-transform: uppercase; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 8px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-size: 0.85rem; font-family: inherit; }
        input:focus { border-color: var(--accent); outline: none; }

        .tool-card { background: #0a0a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1e1e3f; position: relative; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: #ff3131; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; border: 2px solid var(--bg); }

        .gen-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 30px; font-family: 'Russo One'; font-size: 1.1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
        
        #loader { display: none; margin: 20px 0; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0,212,255,0.1); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #output-section { display: none; margin-top: 20px; text-align: center; padding: 20px; border-top: 1px solid #333; }
        .action-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .action-btn { flex: 1; min-width: 80px; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.8rem; }
        .btn-run { background: #28a745; color: white; }
        .btn-copy { background: #007bff; color: white; }
        .btn-dl { background: #ffc107; color: #000; }

        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 10000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

<h1>FTGM TOOLKIT MAKER V2</h1>

<div class="container">
    <div class="section-title">1. Toolkit Branding</div>
    <input type="text" id="tkTitle" placeholder="Main Title (e.g. FTGM HACKS)">
    <input type="text" id="tkSub" placeholder="Subtitle (e.g. Premium Tech Tools)">
    <input type="text" id="tkWa" placeholder="WhatsApp Channel Link">

    <div class="section-title">2. Tools Manager</div>
    <div id="toolList"><div class="tool-card" id="card0">
        <span class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>
        <input type="text" id="n0" value="Sim DB" placeholder="Tool Name">
        <input type="text" id="u0" value="https://ftgmdb.pages.dev" placeholder="URL Link">
        <input type="text" id="i0" value="fa-bolt" placeholder="FontAwesome Icon (e.g. fa-bolt)">
    </div><div class="tool-card" id="card1">
        <span class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>
        <input type="text" id="n1" value="Main Site" placeholder="Tool Name">
        <input type="text" id="u1" value="https://ftgmtools.pages.dev" placeholder="URL Link">
        <input type="text" id="i1" value="fa-user-secret" placeholder="FontAwesome Icon (e.g. fa-bolt)">
    </div><div class="tool-card" id="card2">
        <span class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>
        <input type="text" id="n2" value="Wallpapers" placeholder="Tool Name">
        <input type="text" id="u2" value="https://ftgmtools.pages.dev/wallpaper" placeholder="URL Link">
        <input type="text" id="i2" value="fa-image" placeholder="FontAwesome Icon (e.g. fa-bolt)">
    </div><div class="tool-card" id="card3">
        <span class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>
        <input type="text" id="n3" value="TikTok Downloader" placeholder="Tool Name">
        <input type="text" id="u3" value="https://ftgmtools.pages.dev/ttsaver" placeholder="URL Link">
        <input type="text" id="i3" value="fa-download" placeholder="FontAwesome Icon (e.g. fa-bolt)">
    </div></div>
    <button onclick="addTool()" style="background:none; border:1px dashed var(--accent); color:var(--accent); width:100%; padding:10px; border-radius:8px; font-size: 0.8rem;">+ ADD CUSTOM TOOL</button>

    <div class="section-title">3. Visual Settings</div>
    <select id="tkColor">
        <option value="#00d4ff">Neon Blue</option>
        <option value="#39ff14">Neon Green</option>
        <option value="#bc13fe">Cyber Purple</option>
        <option value="#ff3131">Neon Red</option>
    </select>
    <select id="tkFont">
        <option value="'Audiowide'">Audiowide (Cyber)</option>
        <option value="'Anta'">Anta (Modern)</option>
        <option value="'Russo One'">Russo One (Bold)</option>
        <option value="'Nova Square'">Nova Square (Tech)</option>
        <option value="'Keania One'">Keania One (Military)</option>
    </select>
    <select id="tkBgAnim">
        <option value="none">No Animation</option>
        <option value="matrix">Matrix Rain</option>
        <option value="network">Network Particle Lines</option>
    </select>

    <div class="section-title">4. Security Lock</div>
    <input type="text" id="tkPass" placeholder="Set Unlock Password (Optional)">
    <input type="text" id="tkBuyLink" placeholder="Buy Key / Contact Link">

    <div class="section-title">5. Footer Credits</div>
    <input type="text" id="tkFooter" placeholder="Footer Credit Text (e.g. Created by Faisal)">

    <button class="gen-btn" id="generateBtn" onclick="startGeneration()">GENERATE TOOLKIT</button>

    <div id="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; font-size: 0.7rem;">BUILDING YOUR SYSTEM...</p>
    </div>

    <div id="output-section">
        <h3 style="color:var(--success); margin-bottom:15px;"><i class="fas fa-shield-check"></i> BUILD SUCCESSFUL</h3>
        <div class="action-group">
            <button class="action-btn btn-run" onclick="runCode()"><i class="fas fa-play"></i> PREVIEW</button>
            <button class="action-btn btn-copy" onclick="copyCode()"><i class="fas fa-copy"></i> COPY</button>
            <button class="action-btn btn-dl" onclick="downloadCode()"><i class="fas fa-download"></i> DOWNLOAD</button>
        </div>
    </div>
</div>

<div id="toast"></div>




<script>
let toolCount = 0;
let finalCode = "";

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => { t.className = ""; }, 3000);
}

function addTool(name='', url='', icon='fa-tools') {
    const id = toolCount++;
    const div = document.createElement('div');
    div.className = 'tool-card';
    div.id = `card${id}`;
    div.innerHTML = `
        <span class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>
        <input type="text" id="n${id}" value="${name}" placeholder="Tool Name">
        <input type="text" id="u${id}" value="${url}" placeholder="URL Link">
        <input type="text" id="i${id}" value="${icon}" placeholder="FontAwesome Icon (e.g. fa-bolt)">
    `;
    document.getElementById('toolList').appendChild(div);
}

// Default Tools Setup
addTool("Sim DB", "https://ftgmdb.pages.dev", "fa-bolt");
addTool("Main Site", "https://ftgmtools.pages.dev", "fa-user-secret");
addTool("Wallpapers", "https://ftgmtools.pages.dev/wallpaper", "fa-image");
addTool("TikTok Downloader", "https://ftgmtools.pages.dev/ttsaver", "fa-download");

function startGeneration() {
    document.getElementById('generateBtn').style.display = 'none';
    document.getElementById('output-section').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    setTimeout(() => {
        handleGenerate();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('output-section').style.display = 'block';
        document.getElementById('generateBtn').style.display = 'block';
    }, 3000);
}

function handleGenerate() {
    const title = document.getElementById('tkTitle').value || "FTGM TOOLKIT";
    const sub = document.getElementById('tkSub').value || "CYBER SERVICES";
    const color = document.getElementById('tkColor').value;
    const font = document.getElementById('tkFont').value;
    const bgType = document.getElementById('tkBgAnim').value;
    const pass = document.getElementById('tkPass').value;
    const wa = document.getElementById('tkWa').value || "https://whatsapp.com/channel/0029Vb6eVps5kg73BCVOXP0O";
    const buy = document.getElementById('tkBuyLink').value || "#";
    const footer = document.getElementById('tkFooter').value || "CREATED BY FTGM";
    const devWa = "https://whatsapp.com/channel/0029Vb6eVps5kg73BCVOXP0O";

    let tools = [];
    document.querySelectorAll('.tool-card').forEach(card => {
        const id = card.id.replace('card', '');
        tools.push({
            name: document.getElementById(`n${id}`).value,
            url: document.getElementById(`u${id}`).value,
            icon: document.getElementById(`i${id}`).value
        });
    });

    const payload = generateToolkitHTML(title, sub, color, font, bgType, pass, buy, tools, wa, devWa, footer);
    const encrypted = btoa(unescape(encodeURIComponent(payload)));
    
    finalCode = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title></head><body><script>let enc="${encrypted}";function d(){try{document.open();document.write(decodeURIComponent(escape(atob(enc))));document.close();}catch(e){}}d();<\/script></body></html>`;
    showToast("Build Completed & Encrypted!");
}

function generateToolkitHTML(title, sub, color, font, bgType, pass, buy, tools, wa, devWa, footer) {
    const toolBoxes = tools.map(t => `<a class="tool-box" href="${t.url}" target="_blank"><i class="fas ${t.icon} tool-icon"></i><div class="tool-name">${t.name}</div></a>`).join('');

    let bgCode = "";
    if(bgType === 'matrix') {
        bgCode = `<canvas id="c"></canvas><script>const c=document.getElementById("c"),ctx=c.getContext("2d");c.height=window.innerHeight;c.width=window.innerWidth;const chars="01";const fontSize=15;const columns=c.width/fontSize;const drops=[];for(let x=0;x<columns;x++)drops[x]=1;function draw(){ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="${color}";ctx.font=fontSize+"px arial";for(let i=0;i<drops.length;i++){const text=chars.charAt(Math.floor(Math.random()*chars.length));ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>c.height&&Math.random()>0.975)drops[i]=0;drops[i]++;}}setInterval(draw,33);<\/script>`;
    } else if(bgType === 'network') {
        bgCode = `<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"><\/script><div id="particles-js"></div><script>particlesJS("particles-js", {"particles":{"number":{"value":80},"color":{"value":"${color}"},"shape":{"type":"circle"},"opacity":{"value":0.5},"size":{"value":3},"line_linked":{"enable":true,"distance":150,"color":"${color}","opacity":0.4,"width":1},"move":{"enable":true,"speed":6}}});<\/script>`;
    }

    return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Anta&family=Russo+One&family=Nova+Square&family=Keania+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background:#000; color:white; font-family:${font}, sans-serif; text-align:center; margin:0; overflow-x:hidden; }
        #particles-js, #c { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
        .main { position:relative; z-index:10; padding:20px; }
        .neon-title { font-family:'Audiowide'; font-size:2.2rem; color:${color}; text-shadow: 0 0 10px ${color}, 0 0 20px ${color}; margin-bottom:5px; padding-top:10px; }
        .search-box { width:90%; max-width:400px; padding:12px; border-radius:30px; border:1px solid ${color}; background:rgba(0,0,0,0.7); color:white; margin:20px auto; outline:none; backdrop-filter:blur(5px); }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; }
        .tool-box { background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; border:1px solid ${color}40; text-decoration:none; color:white; transition:0.3s; backdrop-filter:blur(5px); }
        .tool-box:active { transform:scale(0.95); border-color:${color}; }
        .tool-icon { font-size:2rem; color:${color}; margin-bottom:10px; }
        
        .dev-btn { display:inline-flex; align-items:center; gap:10px; padding:15px 30px; background:linear-gradient(45deg, ${color}, #fff); color:#000; border-radius:50px; text-decoration:none; font-weight:bold; margin:25px 0; box-shadow:0 0 20px ${color}80; animation:pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 ${color}80; } 70% { box-shadow: 0 0 0 15px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
        
        #lock { position:fixed; inset:0; background:#000; z-index:9999; display:${pass?'flex':'none'}; align-items:center; justify-content:center; }
        .lock-card { background:#0a0a1a; padding:30px; border-radius:20px; border:1px solid ${color}; width:320px; }
    </style>
</head>
<body>
    ${bgCode}
    <div id="lock">
        <div class="lock-card">
            <h2 style="color:${color}; margin:0;">SYSTEM LOCKED</h2>
            <input type="password" id="pw" placeholder="Enter Access Key" style="width:100%; padding:10px; margin:20px 0; background:#000; border:1px solid ${color}; color:white; border-radius:5px; text-align:center;">
            <button onclick="ck()" style="width:100%; padding:10px; background:${color}; border:none; border-radius:5px; font-weight:bold;">UNLOCK</button>
            <a href="${buy}" style="color:${color}; display:block; margin-top:15px; font-size:0.8rem;">GET ACCESS KEY</a>
        </div>
    </div>
    <div class="main">
        <h1 class="neon-title">${title}</h1>
        <p style="opacity:0.8; margin-bottom:10px;">${sub}</p>
        <input type="text" class="search-box" id="search" placeholder="Search Service..." onkeyup="filter()">
        <div class="grid" id="g">${toolBoxes}</div>
        
        <a href="${devWa}" class="dev-btn"><i class="fab fa-whatsapp"></i> JOIN DEV CHANNEL</a>
        
        <p style="opacity:0.5; font-size:0.7rem; margin-top:30px;">${footer}</p>
    </div>
    <script>
        function ck(){ if(document.getElementById('pw').value==='${pass}') document.getElementById('lock').style.display='none'; else alert('Access Denied'); }
        function filter(){
            let q=document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.tool-box').forEach(x => {
                x.style.display = x.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }
    <\/script>
</body>
</html>`;
}

function copyCode() {
    const el = document.createElement('textarea');
    el.value = finalCode;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast("<i class='fas fa-copy'></i> Copied to Clipboard!");
}

function runCode() {
    const win = window.open();
    win.document.write(finalCode);
}

function downloadCode() {
    const blob = new Blob([finalCode], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "ftgm-toolkit.html";
    a.click();
    showToast("<i class='fas fa-download'></i> File Downloaded!");
}
</script>
</body></html>
