<!DOCTYPE html><html lang="en"><head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM IMAGE TO LINK TOOL</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ftgm2005/FTGM-WEBSITE/main/ftgm.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --gradient-color-1: #4CAF50; /* Green */
            --gradient-color-2: #8BC34A;   /* Lighter Green */
            --gradient-color-3: #2196F3;   /* Blue */
            --gradient-color-4: #3F51B5;   /* Indigo */
            --secondary-color: #2196F3; /* Blue for icon and link */
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
            overflow: hidden; /* Prevent scrollbar from animated background */
            position: relative;
            color: var(--text-color);
        }

        /* Animated Background */
        .animated-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .animated-background div {
            position: absolute;
            background: rgba(76, 175, 80, 0.1); /* Primary color */
            border-radius: 50%;
            animation: moveCircles 20s infinite linear;
        }

        .animated-background div:nth-child(1) {
            width: 80px; height: 80px;
            left: 10%; top: 20%;
            animation-duration: 25s;
        }
        .animated-background div:nth-child(2) {
            width: 120px; height: 120px;
            left: 70%; top: 50%;
            animation-duration: 30s;
            background: rgba(33, 150, 243, 0.1); /* Secondary color */
        }
        .animated-background div:nth-child(3) {
            width: 60px; height: 60px;
            left: 30%; top: 80%;
            animation-duration: 20s;
        }
        .animated-background div:nth-child(4) {
            width: 100px; height: 100px;
            left: 85%; top: 10%;
            animation-duration: 28s;
            background: rgba(33, 150, 243, 0.1);
        }
        .animated-background div:nth-child(5) {
            width: 90px; height: 90px;
            left: 5%; top: 60%;
            animation-duration: 22s;
        }

        @keyframes moveCircles {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        .container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
            width: 100%;
            max-width: 500px; /* Perfect Size */
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5em; /* Larger, bold title */
            margin-bottom: 30px;
            font-weight: 700;
            /* Animated Gradient Text */
            background: linear-gradient(45deg, var(--gradient-color-1), var(--gradient-color-2), var(--gradient-color-3), var(--gradient-color-4), var(--gradient-color-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%; /* Make gradient larger than text for animation */
            animation: gradientAnimation 5s infinite alternate; /* Smooth, repeating animation */
            display: inline-block; /* Essential for gradient to work on text */
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: var(--border-radius);
            padding: 30px 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #666;
            font-weight: 600;
        }

        .upload-area:hover {
            border-color: var(--gradient-color-1);
            color: var(--gradient-color-1);
            background-color: #e8f5e9; /* Light green hover */
        }

        .upload-area i {
            font-size: 3em;
            color: var(--secondary-color);
        }

        input[type="file"] {
            display: none; /* Hide default file input */
        }

        #urlOutput {
            width: calc(100% - 22px); /* Adjust for padding and border */
            padding: 10px;
            margin-top: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            background-color: #f9f9f9;
            color: var(--text-color);
            cursor: text;
            text-align: center; /* Center the text in the input */
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px; /* Round button */
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .upload-button {
            background: linear-gradient(45deg, var(--gradient-color-1), var(--gradient-color-2));
            color: white;
            font-weight: 600;
        }

        .upload-button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .upload-button:active {
            transform: translateY(0);
        }

        .copy-button {
            background-color: #6c757d; /* Gray for copy */
            color: white;
            font-weight: 600;
        }

        .copy-button:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .copy-button:active {
            transform: translateY(0);
        }

        /* Loader styles */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--gradient-color-1);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none; /* Hidden by default */
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notification - Updated for Center */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 999;
            left: 50%;
            top: 50%; /* Center vertically */
            transform: translate(-50%, -50%); /* Adjust for both centerings */
            font-size: 1em;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        .toast.error {
            background-color: #d32f2f; /* Red for error */
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: #777;
        }

        .footer a {
            color: var(--secondary-color); /* Highlighted link color */
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--gradient-color-1);
            text-decoration: underline;
        }

        /* --- MODERN POPUP STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Above everything else */
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--card-background);
            padding: 30px;
            border-radius: var(--border-radius);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.visible .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            font-size: 1.5em;
            color: var(--gradient-color-1);
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-content p {
            margin-bottom: 30px;
            color: #555;
            font-size: 1em;
        }

        .modal-button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-button-group button, .modal-button-group a {
            text-decoration: none;
            display: block; /* Make links full width */
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .join-button {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            box-shadow: 0 4px 8px rgba(37, 211, 102, 0.3);
        }

        .join-button:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
        }

        .joined-button {
            background-color: #f0f2f5;
            color: var(--text-color);
            border: 1px solid #ddd;
        }

        .joined-button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="animated-background">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="container">
        <h1>FTGM IMAGE TO LINK Generator</h1>

        <div class="upload-area" onclick="document.getElementById('imageUpload').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Click or Drag to Upload Image</span>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="loader" id="loader"></div>

        <input type="text" id="urlOutput" readonly="" placeholder="Your image link will appear here...">

        <div class="button-group">
            <button class="upload-button" onclick="uploadAndGenerate()">Generate Link</button>
            <button class="copy-button" onclick="copyLink()">Copy Link</button> 
        </div>

        <div class="footer">
            Visit Our <a href="https://ftgmtools.pages.dev" target="_blank">More Tools</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="whatsappModal" class="modal-overlay visible">
        <div class="modal-content">
            <h2><i class="fab fa-whatsapp" style="color: #25D366;"></i> Warning!</h2>
            <h2 style="font-size: 1.8em;">You Need To Follow Channel To Use This Tool</h2>
            <p>This Tool is Developed By FTGM. You Should Follow FTGM HACKS Channel For More Tools, Hacks And Methods In Free!</p>

            <div class="modal-button-group">
                <a href="https://whatsapp.com/channel/0029VbAzazM2kNFp4p1qIZ2P" target="_blank" class="join-button">
                    <i class="fab fa-whatsapp"></i> Join WhatsApp Channel
                </a>
                <button class="joined-button" onclick="closeModal()">
                    I Already Joined
                </button>
            </div>
        </div>
    </div>
    


<script>
        // Use a flag to track if the user has dismissed the modal
        let isModalDismissed = false;

        function closeModal() {
            document.getElementById('whatsappModal').classList.remove('visible');
            isModalDismissed = true;
        }

        // Function to copy the link to the clipboard
        function copyLink() {
            const urlInput = document.getElementById('urlOutput');
            if (urlInput.value) {
                urlInput.select();
                urlInput.setSelectionRange(0, 99999);

                // Use Clipboard API for modern browsers
                navigator.clipboard.writeText(urlInput.value)
                    .then(() => {
                        showToast('Link copied to clipboard!', 'info');
                    })
                    .catch(() => {
                        // Fallback for older browsers
                        document.execCommand('copy');
                        showToast('Link copied to clipboard! Now Use It Anywhere', 'info');
                    });
                return true; // Indicate success
            } else {
                showToast('No link to copy yet. Please upload an image first.', 'error');
                return false; // Indicate failure
            }
        }

        async function uploadImage(fileInput, urlInput) {
            if (!isModalDismissed) {
                showToast('Please close the channel popup first.', 'error');
                return;
            }

            const file = fileInput.files[0];
            if (!file) {
                showToast('Please select an image first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', '274910e7dcf1794b3cdcce6956bc00b3'); // Your provided API key

            try {
                document.getElementById('loader').style.display = 'block';
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    urlInput.value = data.data.url;
                    // --- ENHANCEMENT: AUTO-COPY LINK & CENTERED TOAST ---
                    if (copyLink()) {
                        // The copyLink function already shows a 'Link copied' toast
                        // We will add the success message for generation here
                        showToast('Image uploaded successfully! Link generated.', 'success');
                    } else {
                         // Should not happen if copyLink is used correctly, but good for safety
                        showToast('Image uploaded successfully! Please click "Copy Link".', 'success');
                    }
                    // --- END ENHANCEMENT ---
                } else {
                    showToast('Image upload failed: ' + (data.error.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('Error uploading image: ' + error.message, 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function uploadAndGenerate() {
            const fileInput = document.getElementById('imageUpload');
            const urlInput = document.getElementById('urlOutput');
            uploadImage(fileInput, urlInput);
        }

        // Function to show toast notification (now centered)
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            // Remove previous classes and add new ones
            toast.className = 'toast ' + type; 
            
            // Force reflow/repaint before adding 'show' for transition to work
            void toast.offsetWidth; 
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000); // Hide after 3 seconds
        }

        // Drag and drop functionality
        const uploadArea = document.querySelector('.upload-area');
        const fileInput = document.getElementById('imageUpload');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--gradient-color-1)';
            uploadArea.style.color = 'var(--gradient-color-1)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.color = '#666';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.color = '#666';
            fileInput.files = e.dataTransfer.files;
            uploadAndGenerate(); // Auto-upload on drop
        });
    </script>
</body></html>
