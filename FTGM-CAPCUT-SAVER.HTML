<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTGM CapCut Saver</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #050505;
            --ios-card: rgba(30, 30, 32, 0.7);
            --ios-blue: #007AFF;
            --ios-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated Blurry Background */
        .bg-blur {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--ios-blue);
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }

        .blob-2 {
            background: #6200ea;
            right: 0;
            bottom: 0;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: var(--ios-card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 40px 25px;
            border: 1px solid var(--ios-border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 1;
        }

        /* Archivo Black Bold Title */
        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            color: #fff;
        }

        p { color: #A1A1A6; font-size: 13px; margin-bottom: 35px; font-weight: 500; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--ios-border);
            border-radius: 16px;
            padding: 18px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: var(--ios-blue); background: rgba(255, 255, 255, 0.12); }

        .download-btn {
            width: 100%;
            background: var(--ios-blue);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .download-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Enhanced Fetching Animation */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 25px 0;
        }

        .enhanced-loader {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(0, 122, 255, 0.1);
            border-top: 3px solid var(--ios-blue);
            border-right: 3px solid var(--ios-blue);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .loading-text {
            margin-top: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ios-blue);
            letter-spacing: 1px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #result {
            display: none;
            margin-top: 25px;
            animation: iosReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .preview-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .save-btn {
            display: block;
            width: 100%;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 15px;
        }

        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid var(--ios-border);
        }

        .website-link {
            color: var(--ios-blue);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copyright { font-size: 10px; color: #48484A; margin-top: 12px; }
    </style>
<script>(function(){var n=function(){};['log','warn','error','info','debug','dir','trace','table','group','groupEnd','time','timeEnd','assert','count','clear'].forEach(function(k){try{window.console[k]=n;}catch(e){}});})();</script></head>
<body>

    <div class="bg-blur">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <h1>FTGM CapCut Saver</h1>
        <p>Premium No-Watermark Downloader</p>

        <div id="input-area">
            <input type="text" id="urlInput" placeholder="Paste link here..." autocomplete="off">
            <button class="download-btn" onclick="processVideo()">
                <i class="fas fa-arrow-down"></i> DOWNLOAD NOW
            </button>
        </div>

        <div class="loader-container" id="loader">
            <div class="enhanced-loader"></div>
            <div class="loading-text">GETTING VIDEO...</div>
        </div>

        <div id="result">
            <img id="resCover" class="preview-img" src="" alt="Thumbnail">
            <a id="resBtn" href="#" class="save-btn" target="_blank">
                <i class="fas fa-download"></i> SAVE TO DEVICE
            </a>
        </div>

        <div class="footer">
            <a href="https://whatsapp.com/channel/0029VbAVaylCnA7pF6IP0R46" class="website-link">
                <i class="fas fa-external-link-alt"></i> Get Source Code
            </a>
            <div class="copyright">Copyright 2026 | FTGM HACKS Official</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        async function processVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const inputArea = document.getElementById('input-area');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            if (!url) {
                Swal.fire({ icon: 'info', title: 'Paste Link', text: 'Please provide a CapCut URL', background: '#1c1c1e', color: '#fff' });
                return;
            }

            inputArea.style.display = 'none';
            loader.style.display = 'flex';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`https://ftgm-hacks.vercel.app/api/capcut?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                const findVal = (o, k) => {
                    if (o[k]) return o[k];
                    for (let i in o) {
                        if (typeof o[i] === 'object' && o[i] !== null) {
                            let res = findVal(o[i], k);
                            if (res) return res;
                        }
                    }
                };

                const video = findVal(data, 'originalVideoUrl');
                const cover = findVal(data, 'coverUrl');

                if (video) {
                    document.getElementById('resCover').src = cover || '';
                    document.getElementById('resBtn').href = video;
                    resultDiv.style.display = 'block';
                } else {
                    throw new Error();
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Oops!', text: 'Could not fetch video', background: '#1c1c1e', color: '#fff' });
                inputArea.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>

</html>
