<!DOCTYPE html><html lang="en"><head>


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTGM T-Mail Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light Theme with Dark Green/Gray Focus */
      --primary-start: #047857; /* Dark Green */
      --primary-end: #065f46; /* Even Darker Green for gradient end */
      --secondary-start: #3b82f6; /* Blue for secondary action */
      --secondary-end: #2563eb;
      --success-start: #10b981; /* Green for toast */
      --success-end: #059669;
      
      --bg-color: #f4f7f9; /* Light Gray Background (Light Theme) */
      --card-bg: #ffffff; /* White Card Background */
      --text-color: #212529; /* Dark Text */
      --text-muted: #6c757d; /* Gray Muted Text */
      --border-color: #e9ecef; /* Light Border */
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.07);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      color: var(--text-color);
      line-height: 1.6;
    }
    header {
      /* Green Gradient Header */
      background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
      color: white;
      padding: 3rem 1rem;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .container {
      max-width: 800px;
      margin: -2rem auto 2rem auto;
      padding: 0 1rem;
      position: relative;
      z-index: 10;
    }
    .card {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
      border: 1px solid var(--border-color);
    }
    .email-display-wrapper {
      max-width: 500px;
      margin: 1rem auto 0 auto;
    }
    #addr {
      width: 100%;
      font-size: 1.25rem;
      padding: 0.8rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 0.5rem;
      background-color: #f8f9fa; /* Light input background */
      color: var(--primary-start); /* Dark Green Text for email */
      text-align: center;
      font-weight: 600;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    #addr:focus {
      outline: none;
      border-color: var(--primary-start);
      box-shadow: 0 0 0 4px rgba(4, 120, 87, 0.15); /* Green shadow focus */
    }
    .inbox h2, .message-view h2 {
      margin: 0 0 1.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-color);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    tbody tr {
      transition: background-color 0.2s ease, transform 0.2s ease;
    }
    tbody tr:hover {
      background-color: #f8f9fa; /* Light subtle hover */
      cursor: pointer;
      transform: translateY(-2px);
    }
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }
    button {
      padding: 0.8rem 1.8rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease;
      background-size: 200% auto;
      box-shadow: var(--shadow);
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    button i {
      margin-right: 0.75rem;
    }
    /* Dark Green Buttons */
    .btn-primary { background-image: linear-gradient(to right, var(--primary-start) 0%, #14b8a6 51%, var(--primary-start) 100%); }
    /* Blue Secondary Button (Copy) */
    .btn-secondary { background-image: linear-gradient(to right, var(--secondary-start) 0%, #60a5fa 51%, var(--secondary-start) 100%); }
    /* Dark Green Refresh Button */
    .btn-warning { background-image: linear-gradient(to right, var(--primary-start) 0%, #14b8a6 51%, var(--primary-start) 100%); color: var(--text-color); }
    .btn-contact {
      background-image: linear-gradient(to right, #25d366 0%, #28e06c 51%, #25d366 100%);
      padding: 1rem 2rem;
      font-size: 1.1rem;
      border-radius: 50px;
      font-weight: 600;
      width: 100%;
      max-width: 400px;
    }
    .contact-section {
      text-align: center;
    }
    .copy-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--success-start);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      display: none;
      animation: fadeIn 0.3s forwards, fadeOut 0.3s 2.5s forwards;
    }
    .message-view {
        padding-bottom: 1.5rem;
    }
    .message-header {
      background-color: #f8f9fa;
      border: 1px solid var(--border-color);
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .message-header strong {
        color: var(--text-muted);
    }
    .message-body {
      padding: 1rem;
      line-height: 1.7;
      word-break: break-word;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      background-color: var(--bg-color);
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      color: var(--text-color); /* Ensure text is readable */
    }
    @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes fadeOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 20px); } }
    .logo-footer {
      text-align: center;
      padding: 3rem 1rem 2rem 1rem;
    }
    .logo-footer .logo { height: 60px; }
    .logo-footer .logo-title { margin: 1rem 0 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .logo-footer a { color: var(--primary-start); font-weight: 600; text-decoration: none; }
    .loader-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 0;
    }
    .loader {
      border: 4px solid #e9ecef;
      border-top: 4px solid var(--primary-start);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { margin-top: 1rem; font-size: 1rem; color: var(--text-muted); }
    @media (max-width: 768px) {
      header { font-size: 2rem; }
      .container { margin-top: -1.5rem; }
      .card { padding: 1.5rem; }
      .btn-group { flex-direction: column; gap: 0.75rem; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>FTGM TempMail Pro</header>
  <div class="container">
    <div class="card email-box">
      <h3 style="text-align: center; font-weight: 700; margin-top:0;">Your Temporary Email Address</h3>
      <div class="email-display-wrapper">
          <input type="text" id="addr" readonly="" value="Click 'Generate New' to start">
      </div>
      <div class="loader-container" id="loadingAnimation">
        <div class="loader"></div>
        <div class="loading-text">Generating new address...</div>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="genEmail()"><i class="fas fa-plus"></i> Generate New</button>
        <button class="btn-secondary" onclick="copyAddr()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn-warning" onclick="refreshMail()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
    </div>

    <div class="card inbox">
      <h2><i class="fas fa-inbox me-2"></i>Inbox</h2>
      <div id="emptyBox" class="empty">Your inbox is empty.</div>
      <table id="emails" style="display:none;">
        <thead><tr><th>From</th><th>Subject</th><th>Date</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card message-view" id="messageView" style="display: none;">
      <h2><i class="fas fa-envelope-open-text me-2"></i>Message Content</h2>
      <div class="message-header">
        <div><strong>From:</strong> <span id="messageFrom"></span></div>
        <div><strong>Subject:</strong> <span id="messageSubject"></span></div>
        <div><strong>Date:</strong> <span id="messageDate"></span></div>
      </div>
      <div class="message-body" id="messageBody"></div>
    </div>

    <div class="contact-section">
      <a href="https://whatsapp.com/channel/0029VbAzazM2kNFp4p1qIZ2P" target="_blank">
        <button class="btn-contact"><i class="fab fa-whatsapp me-2"></i>Join Developer's Channel</button>
      </a>
    </div>
  </div>

  <div id="copyToast" class="copy-toast">
    <i class="fas fa-check-circle me-2"></i> Copied to clipboard!
  </div>
  
  <div class="logo-footer">
    <img src="https://i.postimg.cc/pXfzRxjh/FTGM-LOGO.png" alt="FTGM HACKS Logo" class="logo">
    <div class="logo-details">
      <h5 class="logo-title">For More Free Tools</h5>
      <a href="https://whatsapp.com/channel/0029VbAzazM2kNFp4p1qIZ2P" target="_blank">
        <i class="fab fa-whatsapp me-1"></i>Follow FTGM HACKS©
      </a>
    </div>
  </div>

  


<script>
    // New API Endpoint and Headers
    const BASE_URL = "https://api.internal.temp-mail.io/api/v3";
    const API_HEADERS = {
        "content-type": "application/json",
        "application-name": "web",
        "application-version": "4.0.0",
        "x-cors-header": "iaWg3pchvFx48fY"
    };

    let currentEmail = null;
    let refreshInterval = null;

    // Function to generate a new temporary email
    async function genEmail() {
      const addrInput = document.getElementById("addr");
      const loadingAnimation = document.getElementById("loadingAnimation");
      
      addrInput.style.display = 'none';
      loadingAnimation.style.display = 'flex';
      document.getElementById('messageView').style.display = 'none';
      
      if (refreshInterval) clearInterval(refreshInterval);

      try {
        const res = await fetch(`${BASE_URL}/email/new`, {
          method: "POST",
          headers: API_HEADERS,
          body: JSON.stringify({min_name_length:10, max_name_length:10})
        });
        
        if (!res.ok) throw new Error('API request failed');

        const data = await res.json();
        currentEmail = data.email;
        addrInput.value = currentEmail;
        
        refreshMail();
        startAutoRefresh();

      } catch (error) {
        console.error("Error generating email:", error);
        addrInput.value = "Error generating email. Try again.";
      } finally {
        loadingAnimation.style.display = 'none';
        addrInput.style.display = 'block';
      }
    }

    // Function to fetch and display messages
    async function refreshMail() {
      if (!currentEmail) return;
      document.getElementById('messageView').style.display = 'none';
      
      try {
        const res = await fetch(`${BASE_URL}/email/${currentEmail}/messages`, {
          method: "GET",
          headers: API_HEADERS
        });

        if (!res.ok) throw new Error('API request failed');
        
        const messages = await res.json();
        const tbody = document.querySelector("#emails tbody");
        tbody.innerHTML = "";
        
        if (!Array.isArray(messages) || messages.length === 0) {
          document.getElementById("emptyBox").style.display = "block";
          document.getElementById("emails").style.display = "none";
          return;
        }
        
        document.getElementById("emptyBox").style.display = "none";
        document.getElementById("emails").style.display = "table";
        
        messages.forEach((msg) => {
          const row = document.createElement("tr");
          row.onclick = () => readMessage(msg); 
          row.innerHTML = `
            <td>${msg.from}</td>
            <td>${msg.subject || "(No subject)"}</td>
            <td>${new Date(msg.created_at).toLocaleString()}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error("Error refreshing mail:", error);
      }
    }
    
    // Function to start the 15-second auto-refresh interval
    function startAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval); 
      refreshInterval = setInterval(refreshMail, 15000); // 15 seconds
    }


    // Function to display the full message content
    function readMessage(msg) {
      document.getElementById('messageFrom').textContent = msg.from;
      document.getElementById('messageSubject').textContent = msg.subject || '(No Subject)';
      document.getElementById('messageDate').textContent = new Date(msg.created_at).toLocaleString();
      
      const content = msg.body_html || msg.body_text || "(No content available)";
      
      const messageBodyElement = document.getElementById('messageBody');
      
      if (msg.body_html) {
        messageBodyElement.innerHTML = content;
        messageBodyElement.style.whiteSpace = 'normal';
      } else {
        messageBodyElement.textContent = content;
        messageBodyElement.style.whiteSpace = 'pre-wrap';
      }
      
      const messageView = document.getElementById('messageView');
      messageView.style.display = 'block';
      messageView.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    function showCopyToast() {
      const toast = document.getElementById("copyToast");
      toast.style.display = "block";
      setTimeout(() => toast.style.display = "none", 2500);
    }

    // ✅ FIX: Cross-browser Copy Function with Fallback
    function copyAddr() {
      const addr = document.getElementById("addr");
      if (!addr.value || addr.value.includes("Click 'Generate New'")) return;

      // Select the text field
      addr.select();
      addr.setSelectionRange(0, 99999); // For mobile devices

      try {
        // Attempt to use the modern Clipboard API
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(addr.value)
              .then(() => showCopyToast())
              .catch(() => {
                  // Fallback for failed modern copy
                  document.execCommand('copy');
                  showCopyToast();
              });
        } else {
            // Fallback for older browsers
            document.execCommand('copy');
            showCopyToast();
        }
      } catch (err) {
        console.error('Copy command failed:', err);
      }
    }
  </script>
</body></html>
